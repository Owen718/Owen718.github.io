{{- if .IsHome }}
<script>document.documentElement.classList.add("is-homepage");</script>
{{- end }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<script>
document.addEventListener("DOMContentLoaded", function () {
  try {
    document.documentElement.classList.add("js-ready");
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      return;
    }
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.16, rootMargin: "0px 0px -8% 0px" });
    document.querySelectorAll(".reveal-on-scroll, .reveal-item, .reveal-image").forEach(function (node) {
      observer.observe(node);
    });
  } catch (error) {}
});
</script>
